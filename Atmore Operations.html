<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Atmore Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400..700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ============================================================
   Atmore Operations — design tokens
   Aesthetic: "Operating manual" — warm cream paper, slate ink,
   serif display for property names, technical sans + tabular mono.
============================================================ */
:root {
  --paper:     #f6f1e6;
  --paper-2:   #fbf7ec;     /* slightly lighter — cards/inputs */
  --paper-3:   #efe8d6;     /* slightly darker — hover/active states */
  --ink:       #1c1a14;
  --ink-2:     #4a463c;
  --ink-3:     #8a8473;
  --ink-4:     #b8b09c;
  --rule:      #d5cdb8;
  --rule-soft: #e4dec9;

  /* brand */
  --blue:      #34637f;
  --blue-deep: #244658;
  --blue-soft: #d2dde5;
  --blue-tint: #e8eef3;
  --tan:       #a89c83;
  --tan-soft:  #e1dac6;

  /* status */
  --sage:      #4d6e42;
  --sage-soft: #d6e0cb;
  --brick:     #94392a;
  --brick-soft:#ecd1c9;
  --ochre:     #9a6618;
  --ochre-soft:#ebd5ad;

  --shadow-1: 0 1px 0 0 rgba(28,26,20,.04);
  --shadow-2: 0 2px 6px -2px rgba(28,26,20,.08);
  --shadow-card: 0 1px 2px -1px rgba(28,26,20,.05), 0 4px 12px -6px rgba(28,26,20,.06);
  --shadow-card-h: 0 2px 4px -2px rgba(28,26,20,.07), 0 8px 22px -8px rgba(28,26,20,.10);

  --radius-s: 4px;
  --radius:   6px;
  --radius-l: 10px;
}

* { box-sizing: border-box; }
html, body { margin:0; padding:0; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'IBM Plex Sans', ui-sans-serif, system-ui, sans-serif;
  font-feature-settings: 'cv05', 'cv11';
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Tabular numerals everywhere by default in mono and number contexts */
.num, .mono { font-variant-numeric: tabular-nums; }
.mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
.serif { font-family: 'Source Serif 4', Georgia, serif; }

a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; text-underline-offset: 2px; }

/* ─── Layout shell ─── */
.app {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr;
}

.topbar {
  background: var(--paper);
  border-bottom: 1px solid var(--rule);
  padding: 14px 28px 0 28px;
  position: sticky; top: 0; z-index: 30;
}
.topbar__row {
  display: flex; align-items: center; gap: 24px;
}
.topbar__tabs {
  display: flex; gap: 0; margin-top: 14px; align-items: stretch;
}
.tab {
  padding: 8px 14px 12px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-2);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
  display: inline-flex; align-items: center; gap: 6px;
}
.tab:hover { color: var(--ink); background: var(--paper-3); }
.tab--active { color: var(--ink); border-bottom-color: var(--blue); font-weight: 600; }
.tab__count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  background: var(--paper-3);
  border: 1px solid var(--rule);
  padding: 1px 6px;
  border-radius: 999px;
  color: var(--ink-2);
}
.tab--alert .tab__count { background: var(--brick-soft); border-color: var(--brick); color: var(--brick); }

.page {
  padding: 24px 28px 80px 28px;
  max-width: 1480px;
  margin: 0 auto;
  width: 100%;
}

/* ─── Section heading ─── */
.section-h {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 16px;
}
.section-h h1 {
  font-family: 'Source Serif 4', serif;
  font-weight: 500;
  font-size: 26px;
  letter-spacing: -0.01em;
  margin: 0;
}
.section-h .crumbs {
  font-size: 12px;
  color: var(--ink-3);
  margin-bottom: 4px;
}

/* ─── Card / surface ─── */
.card {
  background: var(--paper-2);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
}
.card--alert { border-color: var(--brick); }
.card--accent { border-color: var(--blue); }
.card__head {
  padding: 12px 14px;
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.card__head h3 {
  font-family: 'Source Serif 4', serif;
  font-weight: 500;
  font-size: 16px;
  margin: 0;
  letter-spacing: -0.005em;
}
.card__head .meta { font-size: 12px; color: var(--ink-3); }
.card__body { padding: 14px; }
.card__body--tight { padding: 6px 0; }

/* ─── Tags / chips ─── */
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
  background: var(--paper-3);
  color: var(--ink-2);
  border: 1px solid var(--rule);
  white-space: nowrap;
  line-height: 1.5;
}
.tag--blue   { background: var(--blue-tint);   color: var(--blue-deep); border-color: var(--blue-soft); }
.tag--sage   { background: var(--sage-soft);   color: var(--sage); border-color: #b9cba8; }
.tag--brick  { background: var(--brick-soft);  color: var(--brick); border-color: #d8a89e; }
.tag--ochre  { background: var(--ochre-soft);  color: var(--ochre); border-color: #d9b780; }
.tag--ghost  { background: transparent; color: var(--ink-3); border-style: dashed; }
.tag--solid-brick { background: var(--brick); color: white; border-color: var(--brick); }
.tag--solid-blue  { background: var(--blue);  color: white; border-color: var(--blue); }

.dot { width:8px; height:8px; border-radius:50%; display:inline-block; }

/* ─── Buttons ─── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  background: var(--paper-2);
  border: 1px solid var(--rule);
  border-radius: var(--radius-s);
  cursor: pointer;
  line-height: 1.3;
  transition: background 80ms;
}
.btn:hover { background: var(--paper-3); }
.btn:active { background: var(--rule-soft); }
.btn--primary {
  background: var(--blue);
  color: white;
  border-color: var(--blue);
}
.btn--primary:hover { background: var(--blue-deep); border-color: var(--blue-deep); }
.btn--danger {
  background: var(--brick);
  color: white;
  border-color: var(--brick);
}
.btn--danger:hover { background: #7a2f23; }
.btn--ghost {
  background: transparent;
  border-color: transparent;
  color: var(--ink-2);
}
.btn--ghost:hover { background: var(--paper-3); color: var(--ink); }
.btn--sm { padding: 4px 8px; font-size: 12px; }
.btn--lg { padding: 9px 16px; font-size: 14px; }
/* Disabled state — make it visually obvious so a no-op click reads as "not yet". */
.btn:disabled, .btn[disabled] { opacity: 0.4; cursor: not-allowed; }
.btn:disabled:hover { background: var(--paper-2); }
.btn--primary:disabled:hover { background: var(--blue); border-color: var(--blue); }
.btn--danger:disabled:hover { background: var(--brick); border-color: var(--brick); }
.btn--ghost:disabled:hover { background: transparent; color: var(--ink-2); }

/* ─── Form fields ─── */
.input, .select {
  font-family: inherit;
  font-size: 13px;
  padding: 6px 10px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  border-radius: var(--radius-s);
  color: var(--ink);
  min-width: 120px;
}
.input:focus, .select:focus {
  outline: none;
  border-color: var(--blue);
  box-shadow: 0 0 0 3px var(--blue-tint);
}

/* ─── Table ─── */
.tbl { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
.tbl th {
  text-align: left;
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--ink-3);
  padding: 10px 12px;
  border-bottom: 1px solid var(--rule);
  background: var(--paper-2);
  position: sticky; top: 0;
}
.tbl td {
  padding: 11px 12px;
  border-bottom: 1px solid var(--rule-soft);
  vertical-align: middle;
}
.tbl tr:hover td { background: var(--paper-3); cursor: pointer; }
.tbl td.num, .tbl th.num { text-align: right; font-variant-numeric: tabular-nums; }
.tbl td.dim { color: var(--ink-3); }
.tbl tr.row--late td { background: rgba(148, 57, 42, 0.04); }
.tbl tr.row--late:hover td { background: rgba(148, 57, 42, 0.08); }

/* ─── Progress ─── */
.progress {
  background: var(--paper-3);
  height: 6px;
  border-radius: 3px;
  overflow: hidden;
  min-width: 80px;
}
.progress > i {
  display: block;
  height: 100%;
  background: var(--blue);
  border-radius: 3px;
  transition: width 200ms;
}
.progress--sage > i { background: var(--sage); }
.progress--brick > i { background: var(--brick); }
.progress--ochre > i { background: var(--ochre); }

/* ─── Stat tile ─── */
.stat {
  padding: 14px 18px;
  border-right: 1px solid var(--rule);
}
.stat:last-child { border-right: none; }
.stat__label {
  font-size: 11px;
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
  margin-bottom: 6px;
}
.stat__value {
  font-family: 'Source Serif 4', serif;
  font-size: 26px;
  font-weight: 500;
  letter-spacing: -0.015em;
  line-height: 1.05;
  font-variant-numeric: tabular-nums;
}
.stat__sub {
  font-size: 12px;
  color: var(--ink-2);
  margin-top: 4px;
}
.stat--sage  .stat__value { color: var(--sage); }
.stat--brick .stat__value { color: var(--brick); }
.stat--blue  .stat__value { color: var(--blue); }

/* ─── Address typography ─── */
.addr {
  font-family: 'Source Serif 4', serif;
  font-weight: 500;
  font-size: 15px;
  letter-spacing: -0.005em;
  color: var(--ink);
}
.addr--lg { font-size: 22px; }
.addr--xl { font-size: 30px; line-height: 1.1; }
.addr-sub { font-size: 12px; color: var(--ink-3); }

/* ─── Avatar ─── */
.av {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--blue-tint);
  color: var(--blue-deep);
  border: 1px solid var(--blue-soft);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 600;
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 0;
}

/* ─── Utility ─── */
.row { display: flex; }
.col { display: flex; flex-direction: column; }
.gap-4 { gap: 4px; } .gap-6 { gap: 6px; } .gap-8 { gap: 8px; }
.gap-10 { gap: 10px; } .gap-12 { gap: 12px; } .gap-14 { gap: 14px; }
.gap-16 { gap: 16px; } .gap-20 { gap: 20px; } .gap-24 { gap: 24px; }
.between { justify-content: space-between; }
.items-center { align-items: center; } .items-baseline { align-items: baseline; }
.items-start { align-items: flex-start; } .items-end { align-items: flex-end; }
.wrap { flex-wrap: wrap; }
.grow { flex: 1; min-width: 0; }
.shrink-0 { flex-shrink: 0; }
.center { justify-content: center; align-items: center; }
.text-c { text-align: center; }
.text-r { text-align: right; }
.small { font-size: 12px; } .tiny { font-size: 11px; }
.dim { color: var(--ink-3); }
.mid { color: var(--ink-2); }
.up  { text-transform: uppercase; letter-spacing: 0.06em; font-size: 11px; font-weight: 500; }
.mt-2{margin-top:2px;}.mt-4{margin-top:4px;}.mt-6{margin-top:6px;}.mt-8{margin-top:8px;}.mt-10{margin-top:10px;}.mt-12{margin-top:12px;}.mt-16{margin-top:16px;}.mt-20{margin-top:20px;}.mt-24{margin-top:24px;}
.mb-4{margin-bottom:4px;}.mb-6{margin-bottom:6px;}.mb-8{margin-bottom:8px;}.mb-12{margin-bottom:12px;}.mb-16{margin-bottom:16px;}.mb-20{margin-bottom:20px;}
.pad-0 { padding: 0 !important; }

.grid { display: grid; }
.g-2 { grid-template-columns: 1fr 1fr; gap: 16px; }
.g-3 { grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.g-4 { grid-template-columns: repeat(4, 1fr); gap: 16px; }
.g-5 { grid-template-columns: repeat(5, 1fr); gap: 12px; }

/* arrow */
.arr::after { content: '→'; }

/* hover effect on rows */
.clickable { cursor: pointer; }
.clickable:hover { background: var(--paper-3); }

/* segmented */
.seg {
  display: inline-flex;
  background: var(--paper-3);
  border: 1px solid var(--rule);
  border-radius: var(--radius-s);
  padding: 2px;
}
.seg__btn {
  padding: 5px 11px;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-2);
  background: transparent;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
}
.seg__btn--active {
  background: var(--paper-2);
  color: var(--ink);
  box-shadow: 0 1px 2px rgba(28,26,20,0.07);
}

/* divider */
.divider {
  height: 1px;
  background: var(--rule);
  margin: 16px 0;
}
.divider-v {
  width: 1px;
  background: var(--rule);
  align-self: stretch;
}

/* Kanban */
.kanban-scrolltop {
  overflow-x: auto;
  overflow-y: hidden;
  margin-bottom: 6px;
}
.kanban {
  display: grid;
  grid-template-columns: repeat(8, minmax(220px, 1fr));
  gap: 12px;
  overflow-x: auto;
  scrollbar-width: none;        /* Firefox: hide bottom bar (moved to top) */
}
.kanban::-webkit-scrollbar { display: none; }  /* WebKit: hide bottom bar */
.reorder-btn {
  width: 20px; height: 15px; padding: 0; line-height: 1; font-size: 9px;
  border: 1px solid var(--rule); background: var(--paper-2); color: var(--ink-2);
  border-radius: 3px; cursor: pointer;
}
.reorder-btn:hover:not(:disabled) { background: var(--paper-3); border-color: var(--blue); color: var(--blue); }
.reorder-btn:disabled { opacity: 0.3; cursor: default; }
.kanban__col {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  min-width: 220px;
}
.kanban__head {
  padding: 10px 12px;
  border-bottom: 1px solid var(--rule);
  background: var(--paper-2);
  border-radius: var(--radius) var(--radius) 0 0;
  display: flex; align-items: center; justify-content: space-between;
}
.kanban__head .label {
  font-family: 'Source Serif 4', serif;
  font-size: 13px;
  font-weight: 500;
}
.kanban__body {
  padding: 10px;
  min-height: 200px;
  display: flex; flex-direction: column;
  gap: 8px;
}
.pcard {
  background: var(--paper-2);
  border: 1px solid var(--rule);
  border-radius: var(--radius-s);
  padding: 10px;
  font-size: 12px;
  cursor: pointer;
  transition: border-color 80ms, transform 80ms;
}
.pcard:hover { border-color: var(--blue); transform: translateY(-1px); }
.pcard__addr { font-family: 'Source Serif 4', serif; font-size: 13px; font-weight: 500; line-height: 1.2; }
.pcard__row { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; font-size: 11px; color: var(--ink-2); }
.pcard--stale { border-left: 3px solid var(--brick); padding-left: 9px; }

/* left rail (property detail) */
.rail {
  width: 200px;
  flex-shrink: 0;
}
.rail__item {
  padding: 8px 12px;
  border-radius: var(--radius-s);
  font-size: 13px;
  color: var(--ink-2);
  cursor: pointer;
  font-weight: 500;
  display: flex; align-items: center; justify-content: space-between;
}
.rail__item:hover { background: var(--paper-3); color: var(--ink); }
.rail__item--active {
  background: var(--blue-tint);
  color: var(--blue-deep);
  font-weight: 600;
}

/* sticky bottom alert banner */
.banner-alert {
  background: var(--brick);
  color: white;
  padding: 14px 20px;
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
  box-shadow: var(--shadow-2);
}

/* hover lift */
.hoverlift { transition: box-shadow 160ms ease, border-color 160ms ease, transform 160ms ease; }
.hoverlift:hover { box-shadow: var(--shadow-card-h); border-color: var(--ink-3); }

@keyframes syncpulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* status pip */
.pip {
  display: inline-block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--paper-3);
  color: var(--ink-2);
  border: 1px solid var(--rule);
  letter-spacing: 0;
}
.pip--A { background: #f0e8d8; color: #6a5b30; border-color: #d8c98e; }
.pip--B { background: var(--paper-3); color: var(--ink-2); }
.pip--C { background: var(--ochre-soft); color: var(--ochre); border-color: #d9b780; }
.pip--D { background: var(--blue-tint); color: var(--blue-deep); border-color: var(--blue-soft); }
.pip--E { background: var(--tan-soft); color: var(--tan); border-color: #c8bd9e; }
.pip--F { background: var(--sage-soft); color: var(--sage); border-color: #b9cba8; }
.pip--G { background: var(--blue-soft); color: var(--blue-deep); border-color: var(--blue); }
.pip--H { background: var(--brick-soft); color: var(--brick); border-color: #d8a89e; }
.pip--K { background: var(--blue); color: white; border-color: var(--blue-deep); }

/* sparkbar (used in dashboard) */
.spark {
  display: flex; align-items: flex-end; gap: 2px; height: 36px;
}
.spark > span {
  flex: 1; background: var(--blue); border-radius: 1px 1px 0 0;
  min-width: 3px;
}

/* avatars row */
.av-row { display: inline-flex; }
.av-row .av:not(:first-child) { margin-left: -6px; }

/* small modal — using fixed positioning */
.modal-back {
  position: fixed; inset: 0;
  background: rgba(28,26,20,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  padding: 40px;
}
.modal {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: var(--radius-l);
  max-width: 720px;
  width: 100%;
  max-height: 85vh;
  overflow: auto;
  box-shadow: 0 8px 32px rgba(28,26,20,0.2);
}
.modal__head {
  padding: 18px 22px;
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between;
}
.modal__head h2 {
  font-family: 'Source Serif 4', serif;
  font-size: 20px;
  font-weight: 500;
  margin: 0;
}
.modal__body { padding: 22px; }

/* Hide scrollbar styling for sleekness */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }

/* ─── Polish pass — focus, depth, motion ─── */
.btn:focus-visible,
.seg__btn:focus-visible,
.tab:focus-visible,
.rail__item:focus-visible {
  outline: 2px solid var(--blue);
  outline-offset: 2px;
  border-radius: var(--radius-s);
}
.tab, .rail__item { transition: color 90ms ease, background 90ms ease; }
.card { transition: box-shadow 180ms ease, border-color 180ms ease; }
.tag { transition: background 90ms ease, border-color 90ms ease; }
.modal-back { backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); }
.modal { box-shadow: 0 12px 48px -8px rgba(28,26,20,0.28), 0 2px 8px rgba(28,26,20,0.10); }
.section-h { margin-bottom: 20px; }
.divider-v { background: var(--rule-soft); }
/* crisper type rendering for the premium feel */
body { text-rendering: optimizeLegibility; }
.serif { letter-spacing: -0.005em; }

/* ════════════════════════════════════════════════════════════
   MOBILE LAYER — phones only (≤640px). Desktop is untouched:
   every rule below lives inside this media query. Strategy:
   slim sticky top bar, fixed bottom tab bar for nav, wide tables
   reflow into labeled cards, multi-col grids collapse, modals
   become bottom sheets.
   ════════════════════════════════════════════════════════════ */
.mobile-tabbar, .more-sheet-back { display: none; }   /* desktop: never shown */

@media (max-width: 640px) {
  /* ── Top bar: logo + search glyph only ── */
  .topbar { padding: 10px 14px; }
  .topbar__row { gap: 12px; }
  .topbar__tabs { display: none; }                     /* replaced by bottom bar */
  .topbar__actions { gap: 8px !important; }
  .topbar__actions .topbar-hide-mobile { display: none !important; }
  .topbar__search {
    min-width: 0 !important; width: 40px; height: 38px;
    justify-content: center; padding: 0 !important;
  }
  .topbar__search > span:not(:first-child) { display: none !important; }
  .topbar__search > span:first-child { font-size: 17px; }

  /* ── Page: tighter padding, clear the bottom bar ── */
  .page { padding: 16px 14px calc(74px + env(safe-area-inset-bottom)) 14px; overflow-x: hidden; }
  .section-h { margin-bottom: 14px; flex-wrap: wrap; gap: 4px; }
  .section-h h1 { font-size: 21px; }

  /* Toolbars / inline groups wrap instead of forcing the page wider than the
     screen (flex children otherwise refuse to shrink below their content). */
  .page .row { flex-wrap: wrap; }
  .page .row.nowrap-m { flex-wrap: nowrap; }

  /* ── Collapse multi-column grids ── */
  .g-2, .g-3, .g-4 { grid-template-columns: 1fr; gap: 12px; }
  .g-5 { grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ── Card heads & rows wrap instead of overflowing ── */
  .card__head { flex-wrap: wrap; gap: 8px; }
  .card__head .meta, .card__head .row { flex-wrap: wrap; }
  .seg { overflow-x: auto; max-width: 100%; -webkit-overflow-scrolling: touch; }
  .seg::-webkit-scrollbar { display: none; }

  /* ── Tables → stacked, labeled cards ──
     data-label is stamped onto each <td> at runtime from the table's
     own <thead>, so every value keeps its column name on mobile. */
  .tbl thead { display: none; }
  .tbl, .tbl tbody { display: block; width: 100%; }
  .tbl tr {
    display: block;
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    background: var(--paper-2);
    box-shadow: var(--shadow-card);
    margin-bottom: 10px;
    padding: 4px 12px;
  }
  .tbl tr:hover td { background: transparent; }        /* kill desktop row hover */
  .tbl tr.row--late { background: rgba(148,57,42,0.05); border-color: #d8a89e; }
  .tbl tr.row--late:hover td { background: transparent; }
  .tbl td {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; text-align: right;
    padding: 8px 0; border-bottom: 1px solid var(--rule-soft);
    min-height: 40px;
  }
  .tbl td:last-child { border-bottom: none; }
  .tbl td.num, .tbl th.num { text-align: right; }
  .tbl td::before {
    content: attr(data-label);
    flex: 0 0 auto; text-align: left;
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--ink-3);
    white-space: nowrap;
  }
  .tbl td[data-label=""]::before { content: none; }    /* action/blank columns */

  /* ── Property detail: rail becomes a horizontal chip strip ── */
  .prop-body { flex-direction: column; gap: 12px !important; }
  .prop-body > .rail { width: 100% !important; }

  /* Property header: the address / stat / actions row is an inline flex that
     crams 4 columns side-by-side. Stack it so the big stat amount and the
     action buttons each get full width. */
  .prop-header { flex-wrap: wrap; gap: 14px !important; }
  .prop-header > .divider-v { display: none; }
  .prop-header > .grow { flex: 1 1 100%; }
  .prop-header > .col.items-end { align-items: flex-start !important; width: 100%; min-width: 0 !important; }
  .prop-header > .col.gap-8.items-end { width: 100%; align-items: stretch !important; }
  .prop-header > .col.gap-8.items-end .btn { justify-content: center; }
  .rail .card__body {
    display: flex; gap: 6px; padding: 8px !important;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .rail .card__body::-webkit-scrollbar { display: none; }
  .rail__item { flex: 0 0 auto; white-space: nowrap; min-height: 40px; }

  /* ── Kanban: one column at a glance, swipe across ── */
  .kanban { grid-template-columns: repeat(8, 78vw); }

  /* ── Modals → bottom sheets ── */
  .modal-back { padding: 0; align-items: flex-end; }
  .modal {
    max-width: 100%; width: 100%; max-height: 92vh;
    border-radius: 16px 16px 0 0; border-bottom: none;
    animation: sheet-up 220ms cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  .modal__head { padding: 16px; position: sticky; top: 0; background: var(--paper); z-index: 1; }
  .modal__head h2 { font-size: 18px; }
  .modal__body { padding: 16px; }
  @keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }

  /* ════ Bottom tab bar ════ */
  .mobile-tabbar {
    display: flex; position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
    background: var(--paper); border-top: 1px solid var(--rule);
    padding-bottom: env(safe-area-inset-bottom);
    box-shadow: 0 -2px 12px -4px rgba(28,26,20,0.12);
  }
  .mobile-tabbar__item {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; padding: 8px 2px 7px; min-height: 56px;
    background: none; border: none; cursor: pointer;
    color: var(--ink-3); font-family: inherit; font-size: 10px; font-weight: 500;
    letter-spacing: 0.01em; position: relative;
  }
  .mobile-tabbar__item svg { width: 21px; height: 21px; }
  .mobile-tabbar__item--active { color: var(--blue); }
  .mobile-tabbar__item--active::before {
    content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 28px; height: 2px; background: var(--blue); border-radius: 0 0 2px 2px;
  }
  .mobile-tabbar__badge {
    position: absolute; top: 5px; left: 50%; margin-left: 4px;
    min-width: 15px; height: 15px; padding: 0 3px; border-radius: 999px;
    background: var(--brick); color: #fff; font-size: 9px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ════ "More" sheet ════ */
  .more-sheet-back {
    display: block; position: fixed; inset: 0; z-index: 70;
    background: rgba(28,26,20,0.4);
    backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  }
  .more-sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 71;
    background: var(--paper); border-radius: 16px 16px 0 0;
    padding: 8px 12px calc(16px + env(safe-area-inset-bottom));
    box-shadow: 0 -8px 32px rgba(28,26,20,0.22);
    animation: sheet-up 220ms cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  .more-sheet__grab {
    width: 36px; height: 4px; border-radius: 999px; background: var(--rule);
    margin: 8px auto 12px;
  }
  .more-sheet__item {
    display: flex; align-items: center; gap: 12px; width: 100%;
    padding: 14px 10px; background: none; border: none; cursor: pointer;
    font-family: inherit; font-size: 15px; color: var(--ink); text-align: left;
    border-radius: var(--radius);
  }
  .more-sheet__item:active { background: var(--paper-3); }
  .more-sheet__item svg { width: 20px; height: 20px; color: var(--ink-3); flex: 0 0 auto; }
  .more-sheet__item .grow { text-align: left; }
  .more-sheet__count {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    background: var(--brick-soft); color: var(--brick);
    border: 1px solid var(--brick); padding: 1px 7px; border-radius: 999px;
  }
}
</style>
</head>
